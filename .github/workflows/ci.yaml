name: CI — Build, Push & Update GitOps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_REGISTRY: docker.io
  IMAGE_REPO: harudavv/mazeai-showcases
  IMAGE_NAME: ai-puzzle-solver-backend
  GITOPS_REPO: Escanor4323/ai-Puzzle-Solver-gitops
  GITOPS_MANIFEST: base/deployment.yaml

jobs:
  # ────────────────────────────────────────────────────────────────
  # Job 1a: Build & push CPU image (default — Mac + Windows no-GPU)
  #   Platforms: linux/amd64 + linux/arm64
  #   Tags:  ai-puzzle-solver-backend-<sha>
  #          ai-puzzle-solver-backend-latest   (main branch only)
  # ────────────────────────────────────────────────────────────────
  build-cpu:
    name: Build & Push CPU Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      full-image: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${{ env.IMAGE_NAME }}-${{ github.sha }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up QEMU (for arm64 cross-build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (CPU)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=${{ env.IMAGE_NAME }}-,format=short
            type=raw,value=${{ env.IMAGE_NAME }}-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push CPU image (multi-platform)
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: GPU=false
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

  # ────────────────────────────────────────────────────────────────
  # Job 1b: Build & push GPU image (Windows + NVIDIA CUDA 12.4)
  #   Platform: linux/amd64 only (CUDA does not support arm64)
  #   Tags:  ai-puzzle-solver-backend-gpu-<sha>
  #          ai-puzzle-solver-backend-gpu-latest   (main branch only)
  # ────────────────────────────────────────────────────────────────
  build-gpu:
    name: Build & Push GPU Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata (GPU)
        id: meta-gpu
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}
          tags: |
            type=sha,prefix=${{ env.IMAGE_NAME }}-gpu-,format=short
            type=raw,value=${{ env.IMAGE_NAME }}-gpu-latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push GPU image (amd64 only)
        uses: docker/build-push-action@v5
        with:
          context: .
          build-args: GPU=true
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: ${{ steps.meta-gpu.outputs.tags }}
          labels: ${{ steps.meta-gpu.outputs.labels }}
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu

  # ────────────────────────────────────────────────────────────────
  # Job 2: Update image tag in the GitOps config repo
  # Tracks the CPU (default) image tag; GPU is pulled manually.
  # Only runs on pushes to main (not PRs).
  # ────────────────────────────────────────────────────────────────
  update-gitops:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: build-cpu
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.GITOPS_REPO }}
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Install yq
        run: |
          wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          chmod +x /usr/local/bin/yq

      - name: Update image tag in deployment manifest
        run: |
          NEW_TAG="${{ env.IMAGE_NAME }}-${{ github.sha }}"
          NEW_IMAGE="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPO }}:${NEW_TAG}"

          echo "Updating image to: ${NEW_IMAGE}"

          yq e \
            '.spec.template.spec.containers[] |= select(.name == "backend") .image = "'"${NEW_IMAGE}"'"' \
            -i gitops/${{ env.GITOPS_MANIFEST }}

          echo "--- Updated manifest ---"
          grep "image:" gitops/${{ env.GITOPS_MANIFEST }}

      - name: Commit and push to GitOps repo
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_PAT }}
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          cd gitops

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git remote set-url origin \
            "https://x-access-token:${GITOPS_PAT}@github.com/${{ env.GITOPS_REPO }}.git"

          git add ${{ env.GITOPS_MANIFEST }}

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: bump backend image tag to ${SHORT_SHA}

          Source: ${{ github.repository }}@${GITHUB_SHA}
          Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          git push
